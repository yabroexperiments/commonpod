name: AGENTS.md symlink integrity

on:
  push:
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify AGENTS.md is a symlink to CLAUDE.md
        run: |
          if [ ! -e AGENTS.md ]; then
            echo "AGENTS.md not present at repo root — nothing to verify"
            exit 0
          fi
          if [ ! -L AGENTS.md ]; then
            echo "::error file=AGENTS.md::AGENTS.md is not a symlink. An atomic-save tool may have replaced it."
            echo "::error::Restore locally: rm AGENTS.md && ln -s CLAUDE.md AGENTS.md"
            exit 1
          fi
          target=$(readlink AGENTS.md)
          if [ "$target" != "CLAUDE.md" ]; then
            echo "::error file=AGENTS.md::AGENTS.md points to '$target', expected 'CLAUDE.md'"
            exit 1
          fi
          echo "✓ AGENTS.md → CLAUDE.md symlink verified"
